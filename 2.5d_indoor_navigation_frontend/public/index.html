<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SKKU 제1공학관 실내 내비게이션</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
</head>

<body>
    <div class="spinner-border ms-3 d-none" role="status" id="loadingIndicator">
        <span class="visually-hidden">로딩중...</span>
    </div>
    <div id="toastWrapper"></div>

    <!-- HEADER BAR -->
    <header id="appHeader">
        <div class="header-left">
            <button id="centerBtn" class="header-icon-btn" title="건물 위치로 이동">
                <span class="material-icons">center_focus_weak</span>
            </button>
            <div id="indoorSearchWrapper"></div>
        </div>

        <div class="header-center">
            <div id="buildingInfo">
                <strong id="selectedBuilding"></strong>
                <span id="description"></span>
            </div>
            <div id="routeInfo" style="display:none;"></div>
        </div>

        <div class="header-right">
            <button id="editorToggleBtn" class="header-icon-btn" title="도면 에디터">
                <span class="material-icons">edit</span>
            </button>
            <button id="switch2D" class="header-icon-btn" title="2.5D 보기 전환">
                <span class="material-icons" id="switch2DLabel">3d_rotation</span>
            </button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div id="mainContent">
        <div id="mapContainer">
            <div id="map"></div>
            <div id="flatMap"></div>
        </div>
        <div id="videoPlayerContainer" style="display:none;"></div>
    </div>

    <!-- 층 스크롤 휠 (오른쪽 중단) -->
    <div id="floorWheel">
        <div id="floorWheelInner"></div>
    </div>

    <!-- 숨겨진 레거시 요소들 (JS 참조용) -->
    <div style="display:none;">
        <aside id="descriptionArea"><strong id="selectedBuildingLegacy"></strong><span id="descriptionLegacy"></span></aside>
        <div id="levelControlWrapper">
            <button id="levelShiftUp"></button>
            <div id="levelControlWindow"><ul id="levelControl" class="transition"></ul></div>
            <button id="levelShiftDown"></button>
        </div>
        <div id="legendWrapper"><ul id="legendList"></ul></div>
        <div id="switchWheelchairModeWrapper"><button id="switchWheelchairMode"><img id="switchWheelchairModeIcon" src="/images/screen_bottom.svg" alt="" width="1" height="1"></button></div>
        <div id="quickSettingsWrapper"><ul id="userProfileList"></ul><ul id="userSettingsList"></ul><ul id="languageList"></ul></div>
        <div id="settingsButtonWrapper"><button id="settingsButton"></button></div>
        <div id="zoomControlWrapper"><button id="zoomControlIn"></button><button id="zoomControlOut"></button></div>
        <div id="floorDropdown"><select id="floorSelect"></select></div>
    </div>

    <!-- EDITOR TOOLBAR (hidden by default) -->
    <div id="editorToolbar" class="editor-toolbar" style="display:none;">
        <div class="editor-toolbar-section">
            <span class="editor-toolbar-label">도구</span>
            <button id="editorToolSelect" class="editor-tool-btn active" title="선택/편집">
                <span class="material-icons">near_me</span>
            </button>
            <button id="editorToolWall" class="editor-tool-btn" title="벽 그리기">
                <span class="material-icons">border_all</span>
            </button>
            <button id="editorToolSpace" class="editor-tool-btn" title="공간 그리기">
                <span class="material-icons">crop_square</span>
            </button>
            <button id="editorToolPoi" class="editor-tool-btn" title="POI 배치">
                <span class="material-icons">place</span>
            </button>
            <button id="editorToolGraphNode" class="editor-tool-btn" title="그래프 노드">
                <span class="material-icons">radio_button_unchecked</span>
            </button>
            <button id="editorToolGraphEdge" class="editor-tool-btn" title="그래프 엣지">
                <span class="material-icons">timeline</span>
            </button>
            <button id="editorToolImage" class="editor-tool-btn" title="이미지 오버레이">
                <span class="material-icons">image</span>
            </button>
        </div>

        <div id="editorPoiOptions" class="editor-toolbar-section" style="display:none;">
            <select id="editorPoiType" class="editor-select">
                <option value="stairs">계단</option>
                <option value="elevator">엘리베이터</option>
                <option value="door">출입문</option>
                <option value="restroom">화장실</option>
            </select>
        </div>

        <div class="editor-toolbar-section">
            <span class="editor-toolbar-label">지도</span>
            <select id="editorTileSource" class="editor-select">
                <option value="google-hybrid" selected>Google 하이브리드</option>
                <option value="google-satellite">Google 위성</option>
                <option value="google-road">Google 지도</option>
                <option value="osm">OpenStreetMap</option>
            </select>
        </div>

        <div class="editor-toolbar-section">
            <span class="editor-toolbar-label">층</span>
            <select id="editorLevelSelect" class="editor-select"></select>
        </div>

        <div class="editor-toolbar-section">
            <button id="editorUndo" class="editor-tool-btn" title="실행 취소 (Ctrl+Z)">
                <span class="material-icons">undo</span>
            </button>
            <button id="editorRedo" class="editor-tool-btn" title="다시 실행 (Ctrl+Y)">
                <span class="material-icons">redo</span>
            </button>
            <button id="editorDelete" class="editor-tool-btn" title="삭제 (Delete)">
                <span class="material-icons">delete</span>
            </button>
        </div>

        <div class="editor-toolbar-section">
            <button id="editorExportLevel" class="editor-btn" title="현재 층 GeoJSON 내보내기">층 저장</button>
            <button id="editorExportMerged" class="editor-btn" title="전체 합치기">전체 합치기</button>
            <button id="editorExportGraph" class="editor-btn" title="그래프 저장">그래프 저장</button>
            <button id="editorExportSettings" class="editor-btn" title="설정 저장">설정 저장</button>
        </div>

        <div class="editor-toolbar-section">
            <label class="editor-btn" title="GeoJSON 불러오기">
                불러오기
                <input type="file" id="editorImportGeoJSON" accept=".geojson,.json" style="display:none;" />
            </label>
            <label class="editor-btn" title="그래프 불러오기">
                그래프
                <input type="file" id="editorImportGraph" accept=".json" style="display:none;" />
            </label>
            <label class="editor-btn" title="설정 불러오기">
                설정
                <input type="file" id="editorImportSettings" accept=".json" style="display:none;" />
            </label>
        </div>

        <div class="editor-toolbar-section">
            <button id="editorExit" class="editor-btn editor-btn-danger" title="에디터 종료">✕ 종료</button>
        </div>
    </div>

    <!-- EDITOR IMAGE OVERLAY CONTROLS (hidden by default) -->
    <div id="editorImageControls" class="editor-image-controls" style="display:none;">
        <div class="editor-prop-group">
            <label>도면 이미지</label>
            <input type="file" id="editorImageFile" accept="image/*" />
        </div>
        <div class="editor-prop-group">
            <label>투명도</label>
            <input type="range" id="editorImageOpacity" min="0" max="1" step="0.05" value="0.5" />
        </div>
        <div class="editor-prop-group">
            <label>회전 <span id="editorImageRotationLabel">-8.81°</span></label>
            <input type="range" id="editorImageRotation" min="-180" max="180" step="0.1" value="-8.81" />
        </div>
        <div class="editor-prop-group">
            <label>크기</label>
            <button id="editorImageScaleUp" class="editor-tool-btn-sm">+</button>
            <button id="editorImageScaleDown" class="editor-tool-btn-sm">-</button>
            <span style="color:rgba(255,255,255,0.3);margin:0 2px;">|</span>
            <button id="editorImageFineScaleUp" class="editor-tool-btn-sm" title="미세 확대 (1%)">+</button>
            <button id="editorImageFineScaleDown" class="editor-tool-btn-sm" title="미세 축소 (1%)">-</button>
        </div>
        <div class="editor-prop-group">
            <label>위치 (이동)</label>
            <button id="editorImageMoveUp" class="editor-tool-btn-sm">↑</button>
            <button id="editorImageMoveDown" class="editor-tool-btn-sm">↓</button>
            <button id="editorImageMoveLeft" class="editor-tool-btn-sm">←</button>
            <button id="editorImageMoveRight" class="editor-tool-btn-sm">→</button>
        </div>
        <div class="editor-prop-group">
            <label>위치 (미세)</label>
            <button id="editorImageFineUp" class="editor-tool-btn-sm">↑</button>
            <button id="editorImageFineDown" class="editor-tool-btn-sm">↓</button>
            <button id="editorImageFineLeft" class="editor-tool-btn-sm">←</button>
            <button id="editorImageFineRight" class="editor-tool-btn-sm">→</button>
        </div>
        <button id="editorImageRemove" class="editor-btn editor-btn-danger">이미지 제거</button>
    </div>

    <!-- EDITOR PROPERTIES PANEL (hidden by default) -->
    <div id="editorPropertiesPanel" class="editor-properties-panel" style="display:none;">
        <h4>속성</h4>
        <div id="editorPropertiesContent">
            <p class="editor-hint">요소를 선택하면 속성이 표시됩니다.</p>
        </div>
    </div>

    <!-- Room click popup -->
    <div id="roomPopup" class="room-popup" style="display:none;">
        <button id="popupSetStart" class="popup-btn">📍 출발로 설정</button>
        <button id="popupSetEnd" class="popup-btn">🏁 도착으로 설정</button>
    </div>

    <!-- Modals -->
    <div class="modal fade settings" id="userFeatureSelectionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userFeatureModalLabel">기능 선택</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>
            <div class="modal-body">
                <div class="collection" id="userFeatureList"></div>
                <div class="collection" id="userAccessibleFeatureList"></div>
            </div>
        </div></div>
    </div>
    <div class="modal fade settings" id="userVisualSettingsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="visualSettingsLabel">시각 설정</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>
            <div class="modal-body">
                <div class="collection" id="colorBlindnessList"></div>
                <div class="collection" id="contrastSettingsList"></div>
            </div>
        </div></div>
    </div>

    <script src="./dist/main.js"></script>
    <script src="./dist/style.js"></script>
</body>
</html>
