<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>건물 외곽선 추출 도구</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Pretendard', sans-serif; }
#map { width: 100%; height: 100vh; }
#controls {
  position: fixed; top: 12px; right: 12px; z-index: 1000;
  background: rgba(30,30,30,0.95); color: #fff; padding: 16px;
  border-radius: 10px; font-size: 13px; min-width: 240px;
  backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
#controls h3 { margin-bottom: 10px; font-size: 15px; }
#controls p { margin-bottom: 6px; color: rgba(255,255,255,0.7); line-height: 1.5; }
.btn {
  display: inline-block; padding: 6px 14px; border-radius: 5px;
  border: none; cursor: pointer; font-size: 12px; margin: 3px;
}
.btn-primary { background: #42A5F5; color: #fff; }
.btn-danger { background: #ef5350; color: #fff; }
.btn-success { background: #66BB6A; color: #fff; }
.btn:hover { opacity: 0.85; }
#pointCount { font-weight: bold; color: #42A5F5; }
#output {
  margin-top: 10px; max-height: 200px; overflow-y: auto;
  background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px;
  font-family: monospace; font-size: 11px; white-space: pre-wrap;
  word-break: break-all; display: none;
}
#tileSelect { width: 100%; padding: 4px 8px; border-radius: 4px; margin-bottom: 8px;
  background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
  font-size: 12px; }
#tileSelect option { color: #333; }
</style>
</head>
<body>
<div id="map"></div>
<div id="controls">
  <h3>건물 외곽선 추출</h3>
  <select id="tileSelect">
    <option value="hybrid">Google 하이브리드</option>
    <option value="satellite">Google 위성</option>
    <option value="road">Google 지도</option>
  </select>
  <p>좌클릭: 꼭짓점 추가<br>우클릭: 마지막 점 취소</p>
  <p>꼭짓점: <span id="pointCount">0</span>개</p>
  <button class="btn btn-danger" onclick="clearAll()">전체 초기화</button>
  <button class="btn btn-primary" onclick="undoLast()">되돌리기</button>
  <button class="btn btn-success" onclick="exportGeoJSON()">GeoJSON 복사</button>
  <button class="btn btn-success" onclick="downloadGeoJSON()">파일 다운로드</button>
  <div id="output"></div>
</div>

<script>
// 제1공학관 위치
const CENTER = [37.2940, 126.9766];
const ZOOM = 19;

// Tile layers
const tiles = {
  hybrid: L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
    subdomains: '0123', maxZoom: 22, attribution: 'Google'
  }),
  satellite: L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    subdomains: '0123', maxZoom: 22, attribution: 'Google'
  }),
  road: L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    subdomains: '0123', maxZoom: 22, attribution: 'Google'
  }),
};

const map = L.map('map', { center: CENTER, zoom: ZOOM });
let currentTile = tiles.hybrid.addTo(map);

document.getElementById('tileSelect').addEventListener('change', function() {
  map.removeLayer(currentTile);
  currentTile = tiles[this.value].addTo(map);
});

// Drawing state
const points = [];
const markers = [];
let polygon = null;
let polyline = null;

function updateDisplay() {
  document.getElementById('pointCount').textContent = points.length;

  // Remove old shapes
  if (polygon) { map.removeLayer(polygon); polygon = null; }
  if (polyline) { map.removeLayer(polyline); polyline = null; }

  if (points.length >= 3) {
    polygon = L.polygon(points, {
      color: '#FF5722', weight: 2, fillColor: '#FF9800', fillOpacity: 0.15
    }).addTo(map);
  } else if (points.length >= 2) {
    polyline = L.polyline(points, {
      color: '#42A5F5', weight: 2, dashArray: '6,4'
    }).addTo(map);
  }
}

// Left click: add point
map.on('click', function(e) {
  const latlng = e.latlng;
  points.push([latlng.lat, latlng.lng]);

  const marker = L.circleMarker(latlng, {
    radius: 5, color: '#fff', weight: 2, fillColor: '#42A5F5', fillOpacity: 1
  }).addTo(map);

  // Show coordinate on hover
  marker.bindTooltip(`[${latlng.lng.toFixed(7)}, ${latlng.lat.toFixed(7)}]`, { permanent: false });
  markers.push(marker);

  updateDisplay();
});

// Right click: undo last
map.on('contextmenu', function(e) {
  e.originalEvent.preventDefault();
  undoLast();
});

function undoLast() {
  if (points.length === 0) return;
  points.pop();
  const m = markers.pop();
  if (m) map.removeLayer(m);
  updateDisplay();
}

function clearAll() {
  points.length = 0;
  markers.forEach(m => map.removeLayer(m));
  markers.length = 0;
  updateDisplay();
  document.getElementById('output').style.display = 'none';
}

function buildGeoJSON() {
  if (points.length < 3) { alert('최소 3개 꼭짓점이 필요합니다.'); return null; }

  // GeoJSON uses [lng, lat] order
  const coords = points.map(p => [parseFloat(p[1].toFixed(7)), parseFloat(p[0].toFixed(7))]);
  coords.push(coords[0]); // close ring

  return {
    type: "Feature",
    id: "way/eng1_outline",
    properties: {
      building: "university",
      "building:levels": "5",
      min_level: "1",
      max_level: "5",
      name: "제1공학관",
      "name:en": "Engineering Building 1",
      loc_ref: "ENG1",
      id: "way/eng1_outline"
    },
    geometry: {
      type: "Polygon",
      coordinates: [coords]
    }
  };
}

function exportGeoJSON() {
  const geojson = buildGeoJSON();
  if (!geojson) return;

  const json = JSON.stringify(geojson, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    alert('클립보드에 복사됨! eng1.geojson의 첫 번째 Feature를 교체하세요.');
  });

  const output = document.getElementById('output');
  output.textContent = json;
  output.style.display = 'block';
}

function downloadGeoJSON() {
  const geojson = buildGeoJSON();
  if (!geojson) return;

  const json = JSON.stringify(geojson, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'eng1_outline.geojson';
  a.click();
  URL.revokeObjectURL(url);
}

// Load existing OSM outline for reference
fetch('/geojson/eng1.geojson')
  .then(r => r.json())
  .then(data => {
    const building = data.features.find(f => f.properties?.building);
    if (building) {
      const coords = building.geometry.coordinates[0].map(c => [c[1], c[0]]);
      L.polygon(coords, {
        color: '#888', weight: 1, dashArray: '4,4',
        fillColor: '#888', fillOpacity: 0.05
      }).addTo(map).bindTooltip('기존 OSM 외곽선 (참고용)', { sticky: true });
    }
  })
  .catch(() => {});
</script>
</body>
</html>
