<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>360° Video Player v2 — Preload + Unified Seekbar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }
  #container { width: 100vw; height: 100vh; }

  /* Bottom control bar */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 16px 24px 20px; z-index: 10;
  }

  /* Unified seekbar track */
  #seekbar-container {
    position: relative; width: 100%; height: 20px; cursor: pointer;
    margin-bottom: 10px;
  }
  #seekbar-track {
    position: absolute; top: 8px; left: 0; right: 0; height: 4px;
    background: rgba(255,255,255,0.2); border-radius: 2px;
  }
  #seekbar-progress {
    position: absolute; top: 8px; left: 0; height: 4px;
    background: #0066CC; border-radius: 2px; width: 0%;
    transition: width 0.1s linear;
  }
  #seekbar-thumb {
    position: absolute; top: 4px; width: 12px; height: 12px;
    background: #fff; border-radius: 50%; left: 0%;
    transform: translateX(-50%);
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
    transition: left 0.1s linear;
  }
  /* Clip boundary markers */
  .clip-marker {
    position: absolute; top: 6px; width: 2px; height: 8px;
    background: rgba(255,255,255,0.4); border-radius: 1px;
  }

  /* Button row */
  #button-row {
    display: flex; align-items: center; gap: 12px;
  }
  #button-row button {
    background: none; border: none; color: #fff; cursor: pointer;
    font-size: 20px; padding: 4px 8px; opacity: 0.9;
  }
  #button-row button:hover { opacity: 1; }
  #time-display { font-size: 13px; opacity: 0.8; margin-left: 4px; }
  #clip-label {
    margin-left: auto; font-size: 12px; opacity: 0.6;
    background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 4px;
  }

  /* Status overlay */
  #status {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 8px;
    font-size: 13px; z-index: 10; transition: opacity 0.3s;
  }
  #status.hidden { opacity: 0; pointer-events: none; }

  /* Preload indicator */
  #preload-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: #00C853; z-index: 20; width: 0%;
    transition: width 0.3s;
  }

  /* Loading overlay */
  #loading-overlay {
    position: fixed; inset: 0; background: #111;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 15; transition: opacity 0.5s;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #0066CC; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 14px; opacity: 0.7; }
  #loading-detail { font-size: 12px; opacity: 0.4; margin-top: 6px; }

  /* Buffering spinner (YouTube-style, shown over video) */
  #buffering {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 12; pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  #buffering.show { opacity: 1; }
  .buf-spinner {
    width: 56px; height: 56px; border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
</style>
</head>
<body>
<div id="preload-bar"></div>
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">Loading clips...</div>
  <div id="loading-detail">0 / 2 ready</div>
</div>
<div id="buffering"><div class="buf-spinner"></div></div>
<div id="container"></div>
<div id="status">Loading clips...</div>
<div id="controls">
  <div id="seekbar-container">
    <div id="seekbar-track"></div>
    <div id="seekbar-progress"></div>
    <div id="seekbar-thumb"></div>
  </div>
  <div id="button-row">
    <button id="playBtn" title="Play/Pause">&#9654;</button>
    <span id="time-display">0:00 / 0:00</span>
    <span id="clip-label">Loading...</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ─── Clip Config ───
const clipConfigs = [
  { src: '/sample_video/clip1_h264.mp4', name: 'Corridor A' },
  { src: '/sample_video/clip2_h264.mp4', name: 'Corridor B' }
];

// ─── State ───
let currentClipIdx = 0;
let isPlaying = false;
let isSeeking = false;
let isBuffering = false;
const bufferingEl = document.getElementById('buffering');

// Each clip: { video, duration, loaded }
const clipData = clipConfigs.map(() => ({ video: null, duration: 0, loaded: false }));
let totalDuration = 0;
let clipOffsets = []; // cumulative start times

// ─── Three.js Setup ───
const container = document.getElementById('container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 0.01);

// ─── 360° Sphere ───
const geometry = new THREE.SphereGeometry(500, 60, 40);
geometry.scale(-1, 1, 1);

let texture = null;
const material = new THREE.MeshBasicMaterial({ color: 0x000000 });
const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

// ─── Preload All Clips ───
const statusEl = document.getElementById('status');
const preloadBar = document.getElementById('preload-bar');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');
const loadingDetail = document.getElementById('loading-detail');

function createVideoElement(src) {
  const v = document.createElement('video');
  v.crossOrigin = 'anonymous';
  v.playsInline = true;
  v.preload = 'auto';
  v.muted = false;
  v.src = src;
  return v;
}

async function preloadAllClips() {
  let loaded = 0;
  const promises = clipConfigs.map((cfg, i) => {
    return new Promise((resolve) => {
      const v = createVideoElement(cfg.src);
      clipData[i].video = v;

      v.addEventListener('loadeddata', () => {
        clipData[i].duration = v.duration;
        clipData[i].loaded = true;
        loaded++;
        preloadBar.style.width = `${(loaded / clipConfigs.length) * 100}%`;
        loadingText.textContent = `Loading clips...`;
        loadingDetail.textContent = `${loaded} / ${clipConfigs.length} ready`;
        // Seek to 0 to ensure first frame is decoded
        v.currentTime = 0.01;
        resolve();
      });

      v.addEventListener('error', () => {
        statusEl.textContent = `Error loading ${cfg.name}`;
        clipData[i].duration = 0;
        clipData[i].loaded = true;
        loaded++;
        resolve();
      });

      v.load();
    });
  });

  await Promise.all(promises);

  // Calculate offsets
  clipOffsets = [0];
  for (let i = 0; i < clipData.length; i++) {
    totalDuration += clipData[i].duration;
    if (i < clipData.length - 1) {
      clipOffsets.push(clipOffsets[i] + clipData[i].duration);
    }
  }

  // Set first clip as active
  switchToClip(0);
  renderClipMarkers();

  // Hide loading overlay, show player
  loadingOverlay.classList.add('hidden');
  statusEl.textContent = `Ready — ${clipConfigs.length} clips, total ${formatTime(totalDuration)}`;
  setTimeout(() => statusEl.classList.add('hidden'), 2000);
  preloadBar.style.width = '100%';
  setTimeout(() => { preloadBar.style.opacity = '0'; }, 500);
}

function switchToClip(idx) {
  const wasPlaying = isPlaying;

  // Pause old
  if (clipData[currentClipIdx].video) {
    clipData[currentClipIdx].video.pause();
  }

  currentClipIdx = idx;
  const v = clipData[idx].video;

  // Create a fresh VideoTexture for the new video element
  if (texture) texture.dispose();
  texture = new THREE.VideoTexture(v);
  texture.colorSpace = THREE.SRGBColorSpace;
  material.map = texture;
  material.color.set(0xffffff); // must be white so texture shows through
  material.needsUpdate = true;

  updateClipLabel();

  if (wasPlaying) {
    v.play().catch(() => {});
  }
}

// ─── Unified Seekbar ───
const seekContainer = document.getElementById('seekbar-container');
const seekProgress = document.getElementById('seekbar-progress');
const seekThumb = document.getElementById('seekbar-thumb');
const timeDisplay = document.getElementById('time-display');
const clipLabel = document.getElementById('clip-label');

function getGlobalTime() {
  const v = clipData[currentClipIdx].video;
  if (!v) return 0;
  return clipOffsets[currentClipIdx] + v.currentTime;
}

function globalTimeToClip(globalTime) {
  for (let i = clipOffsets.length - 1; i >= 0; i--) {
    if (globalTime >= clipOffsets[i]) {
      return { clipIdx: i, localTime: globalTime - clipOffsets[i] };
    }
  }
  return { clipIdx: 0, localTime: 0 };
}

function seekToGlobalTime(globalTime) {
  globalTime = Math.max(0, Math.min(totalDuration - 0.01, globalTime));
  const { clipIdx, localTime } = globalTimeToClip(globalTime);

  if (clipIdx !== currentClipIdx) {
    switchToClip(clipIdx);
  }
  const v = clipData[clipIdx].video;
  v.currentTime = localTime;

  // Show buffering if data not ready at seek position
  if (isPlaying && v.readyState < 3) {
    showBuffering();
  }
}

function updateSeekbar() {
  if (isSeeking || totalDuration === 0) return;
  // Only update when video is actually progressing (not buffering)
  const v = clipData[currentClipIdx].video;
  if (!v || v.readyState < 2) return; // HAVE_CURRENT_DATA or higher
  const gt = getGlobalTime();
  const pct = (gt / totalDuration) * 100;
  seekProgress.style.width = pct + '%';
  seekThumb.style.left = pct + '%';
  timeDisplay.textContent = `${formatTime(gt)} / ${formatTime(totalDuration)}`;
}

// Seekbar interaction
let seekDragging = false;

function seekFromEvent(e) {
  const rect = seekContainer.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const targetTime = pct * totalDuration;
  seekToGlobalTime(targetTime);
  seekProgress.style.width = (pct * 100) + '%';
  seekThumb.style.left = (pct * 100) + '%';
  timeDisplay.textContent = `${formatTime(targetTime)} / ${formatTime(totalDuration)}`;
}

seekContainer.addEventListener('pointerdown', (e) => {
  seekDragging = true;
  isSeeking = true;
  seekFromEvent(e);
  e.preventDefault();
});
window.addEventListener('pointermove', (e) => {
  if (seekDragging) seekFromEvent(e);
});
window.addEventListener('pointerup', () => {
  if (seekDragging) {
    seekDragging = false;
    isSeeking = false;
  }
});

// Clip boundary markers
function renderClipMarkers() {
  if (totalDuration === 0) return;
  for (let i = 1; i < clipOffsets.length; i++) {
    const pct = (clipOffsets[i] / totalDuration) * 100;
    const marker = document.createElement('div');
    marker.className = 'clip-marker';
    marker.style.left = pct + '%';
    seekContainer.appendChild(marker);
  }
}

// ─── Buffering detection ───
function showBuffering() {
  if (!isBuffering) {
    isBuffering = true;
    bufferingEl.classList.add('show');
  }
}
function hideBuffering() {
  if (isBuffering) {
    isBuffering = false;
    bufferingEl.classList.remove('show');
  }
}

function attachBufferListeners(v) {
  // 'waiting' fires when playback stops because data isn't available yet
  v.addEventListener('waiting', showBuffering);
  // 'playing' fires when playback resumes after buffering
  v.addEventListener('playing', hideBuffering);
  // 'canplay' also means we have enough data
  v.addEventListener('canplay', hideBuffering);
  // 'seeked' fires when a seek finishes and frame is ready
  v.addEventListener('seeked', hideBuffering);
}

// ─── Auto-advance to next clip ───
function setupAutoAdvance() {
  clipData.forEach((cd, i) => {
    // Attach buffering listeners to each video
    attachBufferListeners(cd.video);

    cd.video.addEventListener('ended', () => {
      if (i < clipData.length - 1) {
        switchToClip(i + 1);
        clipData[i + 1].video.currentTime = 0;
        if (isPlaying) {
          showBuffering(); // show spinner while next clip loads
          clipData[i + 1].video.play().catch(() => {});
        }
      } else {
        // All clips ended
        isPlaying = false;
        playBtn.textContent = '▶';
        hideBuffering();
        statusEl.textContent = 'Walkthrough complete';
        statusEl.classList.remove('hidden');
      }
    });
  });
}

// ─── Play/Pause ───
const playBtn = document.getElementById('playBtn');

playBtn.addEventListener('click', () => {
  const v = clipData[currentClipIdx].video;
  if (isPlaying) {
    v.pause();
    isPlaying = false;
    playBtn.textContent = '▶';
  } else {
    v.play().then(() => {
      isPlaying = true;
      playBtn.textContent = '⏸';
    }).catch(err => {
      statusEl.textContent = 'Play error: ' + err.message;
      statusEl.classList.remove('hidden');
    });
  }
});

function updateClipLabel() {
  clipLabel.textContent = `${currentClipIdx + 1}/${clipConfigs.length} · ${clipConfigs[currentClipIdx].name}`;
}

// ─── Mouse Drag (360° rotation) ───
let isDown = false, prevX = 0, prevY = 0, lon = 0, lat = 0;

container.addEventListener('pointerdown', (e) => {
  if (e.target.closest('#controls')) return;
  isDown = true; prevX = e.clientX; prevY = e.clientY;
});
container.addEventListener('pointermove', (e) => {
  if (!isDown) return;
  lon += (prevX - e.clientX) * 0.2;
  lat += (e.clientY - prevY) * 0.2;
  lat = Math.max(-85, Math.min(85, lat));
  prevX = e.clientX; prevY = e.clientY;
});
container.addEventListener('pointerup', () => isDown = false);
container.addEventListener('pointerleave', () => isDown = false);

container.addEventListener('wheel', (e) => {
  camera.fov += e.deltaY * 0.05;
  camera.fov = Math.max(30, Math.min(100, camera.fov));
  camera.updateProjectionMatrix();
});

// ─── Render Loop ───
function animate() {
  requestAnimationFrame(animate);

  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);
  camera.lookAt(
    500 * Math.sin(phi) * Math.cos(theta),
    500 * Math.cos(phi),
    500 * Math.sin(phi) * Math.sin(theta)
  );

  updateSeekbar();
  renderer.render(scene, camera);
}
animate();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Keyboard shortcuts ───
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
  if (e.code === 'ArrowLeft') seekToGlobalTime(getGlobalTime() - 5);
  if (e.code === 'ArrowRight') seekToGlobalTime(getGlobalTime() + 5);
});

// ─── Init ───
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

preloadAllClips().then(() => {
  setupAutoAdvance();
  updateClipLabel();
});
</script>
</body>
</html>
